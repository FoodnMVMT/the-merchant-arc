<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 104" fill="none" role="img" aria-label="The Merchant Arc">
  <!-- Xaymaca: land of wood & water — wavy spring baseline -->
  <path d="M16 95 q9 -4 18 0 t18 0 t18 0 t14 0" stroke="#081034" stroke-opacity=".45" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M21 99 q9 -3 18 0 t18 0 t13 0" stroke="#081034" stroke-opacity=".22" stroke-width="1.2" stroke-linecap="round"/>

  <!-- The Arc: architectural arch (the structure / clarity gained) -->
  <path d="M30 92 V52 A20 20 0 0 1 70 52 V92" stroke="#081034" stroke-width="4" stroke-linecap="round"/>

  <!-- The Archer's arrow: confusion (low-left) -> through the arc -> clarity -->
  <path d="M20 86 C30 54 62 36 70 34" stroke="#0066FF" stroke-width="3.4" stroke-linecap="round"/>
  <!-- arrowhead -->
  <path d="M78.7 31.8 L71.2 38.9 L68.8 29.2 Z" fill="#0066FF"/>
  <!-- chevron fletching (Taíno geometric linework) -->
  <path d="M13 84 L21.5 79 M14.5 89 L23.5 83.5" stroke="#0066FF" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Clarity: sun the arrow lands on -->
  <circle cx="88" cy="28" r="3.1" fill="#0066FF"/>
  <g stroke="#0066FF" stroke-width="1.6" stroke-linecap="round">
    <path d="M93 28 H95.5"/>
    <path d="M91.5 24.5 L93.3 22.7"/>
    <path d="M88 23 V20.5"/>
    <path d="M84.5 24.5 L82.7 22.7"/>
    <path d="M83 28 H80.5"/>
    <path d="M84.5 31.5 L82.7 33.3"/>
    <path d="M88 33 V35.5"/>
    <path d="M91.5 31.5 L93.3 33.3"/>
  </g>
</svg>
